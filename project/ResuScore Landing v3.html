<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobScorer — AI Career Platform for Indian IT Freshers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800&family=JetBrains+Mono:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; background: #f8fafc; color: #0f172a; line-height: 1.6; overflow-x: hidden; }
    :focus-visible { outline: 2px solid #135bec; outline-offset: 2px; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes confettiFall { 0% { transform:translateY(0) rotate(0deg); opacity:1; } 100% { transform:translateY(48px) rotate(270deg) scale(.5); opacity:0; } }
    @keyframes receiptFadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes snFade { from { opacity:0; transform:scale(1.16) translateY(8px); } to { opacity:1; transform:scale(1.26) translateY(0); } }
    @media(max-width:820px) {
      .sn-wrap { grid-template-columns:1fr !important; gap:18px !important; }
      .sn-visual { display:none !important; }
      .sn-mobile-illo { display:flex !important; }
      .sn-rail-spacer { display:none !important; }
    }
    .fade-hero { opacity:0; animation: fadeUp .65s cubic-bezier(.22,1,.36,1) both; }
    .fh1{animation-delay:0ms} .fh2{animation-delay:80ms} .fh3{animation-delay:160ms} .fh4{animation-delay:240ms} .fh5{animation-delay:320ms}
    ::-webkit-scrollbar { width:5px; } ::-webkit-scrollbar-thumb { background:#e2e8f0; border-radius:3px; }

    /* 3D carousel cards */
    .rs-carousel-card { transition: filter 260ms ease, box-shadow 320ms cubic-bezier(0.22,0.65,0.28,1); }
    @media (max-width:760px) {
      .rs-carousel-card { width:170px !important; }
    }
    @media (prefers-reduced-motion: reduce) {
      .rs-carousel-card { transition:none !important; }
    }
    @media(max-width:900px) { .feat-row{flex-direction:column !important} .india-grid{grid-template-columns:1fr !important} .hero-left-col{text-align:center} .hero-right-col{align-items:center !important} .hero-c-row{grid-template-columns:1fr !important; text-align:center} .hero-c-stats{flex-direction:column !important} .ba-grid{grid-template-columns:1fr !important} }
    @media(max-width:768px) { .hero-product{display:none !important} .hero-two{grid-template-columns:1fr !important} .hero-left-col + .hero-right-col{display:none !important} .hero-c-row > div{justify-content:center !important} }
    @media(max-width:640px) { .how-grid{grid-template-columns:1fr !important} .trust-strip{flex-wrap:wrap !important} body { font-size:16px; } }
    /* Journey grid responsive */
    @media(max-width:980px) { .journey-grid{ grid-template-columns:repeat(2,1fr) !important; } }
    @media(max-width:600px) { .journey-grid{ grid-template-columns:1fr !important; padding:0 24px !important; } }
    /* Pricing cards responsive */
    @media(max-width:980px) { .pricing-cards{ grid-template-columns:repeat(2,1fr) !important; } .pricing-cards > div[style*="translateY(-12px)"]{ transform:none !important; } }
    @media(max-width:560px) { .pricing-cards{ grid-template-columns:1fr !important; } }
    /* Comparison table: horizontal scroll + sticky first column on small screens */
    @media(max-width:760px) {
      .cmp-table-wrap{ overflow-x:auto !important; -webkit-overflow-scrolling:touch; }
      .cmp-table{ min-width:640px; }
      .cmp-table th:first-child, .cmp-table td:first-child{
        position:sticky; left:0; z-index:6; background:#fff !important;
        box-shadow:2px 0 0 rgba(15,23,42,0.06);
      }
      .cmp-table thead th{ position:static !important; }
    }
    @media(max-width:480px) { #pricing > div:first-child > div:last-child > div { grid-template-columns:1fr !important; } }
  </style>
</head>

<script type="text/babel">
const { useState, useEffect } = React;
const { TweaksPanel, TweakSection, TweakRadio, TweakToggle, TweakColor, useTweaks } = window;

// ─── Design tokens ────────────────────────────────────────────────────────
const C = {
  primary:'#135bec', primaryHover:'#0f4cc7', primaryLight:'#e8f0fe',
  bg:'#f8fafc', surface:'#ffffff', surfaceAlt:'#f1f5f9',
  text:'#0f172a', textSec:'#64748b', textTer:'#94a3b8',
  border:'#e2e8f0', borderFaint:'#f1f5f9',
  success:'#10b981', successBg:'#ecfdf5', successBorder:'#a7f3d0',
};
const SANS = "'Plus Jakarta Sans', system-ui, sans-serif";
const MONO = "'JetBrains Mono', monospace";

// ─── Primitives ───────────────────────────────────────────────────────────
function Eyebrow({ color=C.textTer, mb=12, children }) {
  return <div style={{ fontFamily:MONO, fontSize:'0.625rem', fontWeight:700, letterSpacing:'0.18em', textTransform:'uppercase', color, marginBottom:mb }}>{children}</div>;
}

function Btn({ children, href='#', variant='primary', sx={} }) {
  const base = { display:'inline-flex', alignItems:'center', gap:7, padding:'13px 26px', borderRadius:9, fontSize:'0.9375rem', fontWeight:600, fontFamily:SANS, textDecoration:'none', cursor:'pointer', transition:'all 0.15s', border:'none', lineHeight:1 };
  const vs = {
    primary: { background:C.primary, color:'white' },
    ghost:   { background:'transparent', color:C.primary, border:`1.5px solid ${C.border}` },
  };
  return (
    <a href={href} style={{ ...base, ...vs[variant], ...sx }}
      onMouseEnter={e => { e.currentTarget.style.opacity='.86'; e.currentTarget.style.transform='translateY(-1px)'; }}
      onMouseLeave={e => { e.currentTarget.style.opacity='1'; e.currentTarget.style.transform='none'; }}
    >{children}</a>
  );
}

// ─── Nav ──────────────────────────────────────────────────────────────────
function Nav() {
  const [sc, setSc] = useState(false);
  const [st, setSt] = useState(false);
  useEffect(() => {
    const fn = () => { setSc(window.scrollY > 80); setSt(window.scrollY > 600); };
    window.addEventListener('scroll', fn, { passive:true });
    return () => window.removeEventListener('scroll', fn);
  }, []);

  return (
    <nav style={{ position:'fixed', top:0, left:0, right:0, zIndex:200, height:64, display:'flex', alignItems:'center', padding:'0 32px', background: sc ? 'rgba(248,250,252,.9)' : 'transparent', backdropFilter: sc ? 'blur(12px)' : 'none', WebkitBackdropFilter: sc ? 'blur(12px)' : 'none', borderBottom:`1px solid ${sc ? C.border : 'transparent'}`, transition:'all 0.25s ease' }}>
      <div style={{ maxWidth:1200, width:'100%', margin:'0 auto', display:'flex', alignItems:'center' }}>
        <a href="#" style={{ display:'flex', alignItems:'center', gap:9, textDecoration:'none', marginRight:40 }}>
          <div style={{ position:'relative', width:32, height:32, borderRadius:9, background:`linear-gradient(135deg, ${C.primary} 0%, #2563eb 100%)`, display:'flex', alignItems:'center', justifyContent:'center', boxShadow:`0 3px 8px -1px ${C.primary}55` }}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
              <path d="M4 18 L9 12 L13 15 L20 6" />
              <path d="M15 6 L20 6 L20 11" />
            </svg>
          </div>
          <span style={{ fontFamily:SANS, fontWeight:800, fontSize:'1.1875rem', letterSpacing:'-0.025em' }}>
            <span style={{ color:C.text }}>Job</span><span style={{ color:C.primary }}>Scorer</span>
          </span>
        </a>
        <div style={{ display:'flex', alignItems:'center', gap:2 }}>
          {[['Browse Jobs','#browse'],['How it works','#how'],['Pricing','#pricing']].map(([l,h]) => (
            <a key={l} href={h} style={{ padding:'7px 13px', fontSize:'0.875rem', fontWeight:500, color:C.textSec, textDecoration:'none', borderRadius:7, transition:'all 0.15s' }}
              onMouseEnter={e=>{e.currentTarget.style.color=C.text;e.currentTarget.style.background='rgba(15,23,42,.05)';}}
              onMouseLeave={e=>{e.currentTarget.style.color=C.textSec;e.currentTarget.style.background='transparent';}}
            >{l}</a>
          ))}
        </div>
        <div style={{ marginLeft:'auto', display:'flex', alignItems:'center', gap:8 }}>
          {st && <a href="/signup" style={{ display:'inline-flex', alignItems:'center', gap:6, padding:'8px 16px', background:C.primary, color:'white', borderRadius:7, fontSize:'0.8125rem', fontWeight:600, textDecoration:'none', animation:'fadeUp 0.3s ease both' }}>Upload resume</a>}
          <a href="/login" style={{ padding:'8px 13px', fontSize:'0.875rem', fontWeight:500, color:C.textSec, textDecoration:'none', borderRadius:7 }}>Sign in</a>
          {!st && <a href="/signup" style={{ display:'inline-flex', alignItems:'center', padding:'9px 18px', background:C.primary, color:'white', borderRadius:7, fontSize:'0.875rem', fontWeight:600, textDecoration:'none', transition:'background 0.15s' }} onMouseEnter={e=>e.currentTarget.style.background=C.primaryHover} onMouseLeave={e=>e.currentTarget.style.background=C.primary}>Upload resume</a>}
        </div>
      </div>
    </nav>
  );
}

      {/* Company logos — scrolling marquee */}
      <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:18, width:'100%' }}>

          Land interviews at companies like
        </span>
        <div style={{ width:'100%', overflow:'hidden', WebkitMaskImage:'linear-gradient(90deg,transparent 0,black 8%,black 92%,transparent 100%)', maskImage:'linear-gradient(90deg,transparent 0,black 8%,black 92%,transparent 100%)' }}>
          <div className="logo-marquee" style={{ display:'flex', gap:48, alignItems:'center', width:'max-content', padding:'4px 0' }}>
            {LOGOS.map((co,i) => renderLogo(co, 'a'+i))}
            {LOGOS.map((co,i) => renderLogo(co, 'b'+i))}

        .logo-marquee { animation: logoMarquee 48s linear infinite; }
        @media (prefers-reduced-motion: reduce) { .logo-marquee { animation:none; } }
      `}</style>

// ─── How it works ─────────────────────────────────────────────────────────
function ForIndia() {
  const bullets = [
    'Scores jobs from Naukri, LinkedIn India, Instahyre & Internshala',

        <div>
          <Eyebrow color={C.primary}>Built for you</Eyebrow>
          <h2 style={{ fontFamily:SANS, fontSize:'clamp(1.75rem,3vw,2.5rem)', fontWeight:800, letterSpacing:'-0.03em', color:C.text, lineHeight:1.15, marginBottom:20 }}>We built this for the Indian IT fresher.</h2>

// ─── Testimonials ─────────────────────────────────────────────────────────
function Testimonials() {
  const STAR_COLOR = '#f59e0b';
  const REVIEWS = [
    {
      parts: [
        { text:'Got 4 callbacks in 2 weeks after running the ' },
        { text:'ATS analysis on Naukri', hi:true },
        { text:'. Was missing 8 of 12 keywords — fixed in an afternoon.' },
      ],
      name:'Arjun K.', outcome:'Now SDE-1 at Razorpay', stars:5, initials:'AK', color:'#1e3a5f',
    },
    {
      parts: [
        { text:'Pasted a Swiggy JD and got a ' },
        { text:'91% fit score with exact bullet rewrites', hi:true },
        { text:'. ATS keyword score went from 42 to 78 overnight.' },
      ],
      name:'Priya M.', outcome:'Now Backend Engineer at Swiggy', stars:5, initials:'PM', color:'#C2410C',
    },
    {
      parts: [
        { text:'The company research is wild — ' },

      ],

        { text:' and landed an interview at Razorpay in week 2.' },
      ],
      name:'Sneha T.', outcome:'Now SDE at Razorpay', stars:5, initials:'ST', color:'#135bec',
    },
    {
      parts: [
        { text:'The gap analysis showed me I needed ' },
        { text:'Docker and system design basics', hi:true },
        { text:'. Upskilled in 3 weeks and got shortlisted at Postman.' },
      ],
      name:'Karan V.', outcome:'Now Full Stack Engineer at Postman', stars:4, initials:'KV', color:'#7c3aed',
    },
    {
      parts: [
        { text:'Finally understood why I was getting ghosted. ' },
        { text:'The fit score report', hi:true },
        { text:' is brutally honest — and that\'s exactly what I needed.' },
      ],
      name:'Meera R.', outcome:'Now Associate Engineer at Infosys', stars:5, initials:'MR', color:'#0891b2',
    },
    {
      parts: [
        { text:'Scored 15 jobs in one evening. ' },
        { text:'The batch scoring saved me hours', hi:true },
        { text:' and I could see at a glance which ones were actually worth applying to.' },
      ],
      name:'Dev P.', outcome:'Now Senior Engineer at Zepto', stars:5, initials:'DP', color:'#059669',
    },
    {
      parts: [
        { text:'Interview prep + STAR stories are ' },
        { text:'genuinely better than anything I found on YouTube', hi:true },
        { text:'. Got my Swiggy offer after bombing 6 previous interviews.' },
      ],
      name:'Ananya B.', outcome:'Now SDE-2 at Swiggy', stars:5, initials:'AB', color:'#b45309',
    },
  ];

  const Stars = ({count}) => (
    <div style={{display:'flex', gap:2}}>
      {[1,2,3,4,5].map(i => (
        <svg key={i} width="16" height="16" viewBox="0 0 24 24">
          <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"
            fill={i<=count ? STAR_COLOR : '#e2e8f0'} />
        </svg>
      ))}
    </div>
  );

  const Card = ({r}) => (
    <div style={{
      width:320, flexShrink:0,
      background:'#fff', borderRadius:18,
      border:'1px solid #e4e4e7',
      padding:'28px 26px 22px',
      boxShadow:'0 2px 12px rgba(15,23,42,0.06)',
      display:'flex', flexDirection:'column', justifyContent:'space-between',
      userSelect:'none',
    }}>
      {/* Quote */}
      <p style={{fontSize:15, color:'#111827', lineHeight:1.65, marginBottom:28, fontFamily:SANS}}>
        {r.parts.map((p,i) => p.hi
          ? <mark key={i} style={{background:'#e4e4e7', color:'inherit', borderRadius:3, padding:'1px 2px', textDecoration:'underline', textDecorationColor:'#aaa', textUnderlineOffset:2}}>{p.text}</mark>
          : <span key={i}>{p.text}</span>
        )}
      </p>
      {/* Footer */}
      <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', gap:12}}>
        <div style={{display:'flex', alignItems:'center', gap:10}}>
          <div style={{width:40, height:40, borderRadius:'50%', background:r.color, display:'flex', alignItems:'center', justifyContent:'center', color:'rgba(255,255,255,.9)', fontSize:13, fontWeight:700, flexShrink:0, fontFamily:SANS}}>
            {r.initials}
          </div>
          <div>
            <div style={{fontWeight:700, fontSize:14, color:'#111827', fontFamily:SANS}}>{r.name}</div>
            <div style={{fontSize:12, color:C.success, fontWeight:600, marginTop:2, fontFamily:SANS}}>{r.outcome}</div>
          </div>
        </div>
        <Stars count={r.stars} />
      </div>
    </div>
  );

  // ── Marquee engine: rAF-driven so we can pause + manually nudge ──
  const trackRef = React.useRef(null);
  const offsetRef = React.useRef(0);
  const pausedRef = React.useRef(false);
  const halfRef = React.useRef(0);
  const [paused, setPaused] = React.useState(false);
  const SPEED = 28; // px/sec — slowed from the old 36s loop

  React.useEffect(() => {
    const track = trackRef.current;
    if (!track) return;
    const measure = () => { halfRef.current = track.scrollWidth / 2; };
    measure();
    window.addEventListener('resize', measure);
    let raf, last = null;
    const tick = (t) => {
      if (last === null) last = t;
      const dt = (t - last) / 1000; last = t;
      if (!pausedRef.current && halfRef.current > 0) {
        offsetRef.current += SPEED * dt;
        if (offsetRef.current >= halfRef.current) offsetRef.current -= halfRef.current;
        if (offsetRef.current < 0) offsetRef.current += halfRef.current;
        track.style.transform = `translateX(${-offsetRef.current}px)`;
      }
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', measure); };
  }, []);

  const setPause = (v) => { pausedRef.current = v; setPaused(v); };
  const nudge = (dir) => {
    const half = halfRef.current || 1;
    let next = offsetRef.current + dir * 348; // one card (320) + gap (20) + a hair
    if (next >= half) next -= half;
    if (next < 0) next += half;
    offsetRef.current = next;
    if (trackRef.current) trackRef.current.style.transform = `translateX(${-next}px)`;
  };

  const arrowBtn = {
    width:44, height:44, borderRadius:'50%', border:`1px solid ${C.border}`,
    background:'#fff', color:C.text, display:'flex', alignItems:'center', justifyContent:'center',
    cursor:'pointer', boxShadow:'0 2px 8px rgba(15,23,42,0.10)', flexShrink:0,
    transition:'background .15s, border-color .15s, transform .15s',
  };

  return (
    <section style={{padding:'80px 0', background:'#f4f4f5', overflow:'hidden'}}>
      {/* Header */}
      <div style={{textAlign:'center', marginBottom:48, padding:'0 32px'}}>

// ─── Journey — 7 connected steps (hover-expand horizontal) ───────────────
function Journey() {
  const [active, setActive] = React.useState(0);
  const [isMobile, setIsMobile] = React.useState(false);
  const EASE = 'cubic-bezier(0.34,1.10,0.64,1)';
  const railRefs = React.useRef([]);
  const hoveringRef = React.useRef(false);

  // Single source of truth: which rail card is nearest the viewport center.
  const recompute = React.useCallback(() => {
    const mid = window.innerHeight / 2;
    let best = 0, bestDist = Infinity;
    railRefs.current.forEach((el, i) => {
      if (!el) return;
      const r = el.getBoundingClientRect();
      const c = r.top + r.height / 2;
      const d = Math.abs(c - mid);
      if (d < bestDist) { bestDist = d; best = i; }
    });
    // Ensure the final step is reachable: once the last card's top crosses the
    // viewport center, force it active even if its center can't reach mid.
    const lastEl = railRefs.current[railRefs.current.length - 1];
    if (lastEl && lastEl.getBoundingClientRect().top <= mid) best = railRefs.current.length - 1;
    setActive(best);
  }, []);

  React.useEffect(() => {
    const mq = window.matchMedia('(max-width:820px)');
    const u = () => setIsMobile(mq.matches); u();
    mq.addEventListener('change', u);
    return () => mq.removeEventListener('change', u);
  }, []);
  React.useEffect(() => {
    if (isMobile) return;
    let ticking = false;
    const onScroll = () => {
      if (hoveringRef.current) return; // hover is a temporary preview override
      if (!ticking) { ticking = true; requestAnimationFrame(() => { ticking = false; recompute(); }); }
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', onScroll);

            <div key={i} style={{ display:'flex', alignItems:'center', gap:8, fontSize:13, color:C.textSec }}>
              {r.icon} {r.text}
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

  return (
